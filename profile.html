<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي | أجواء الصيف للتكييف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="assets/images/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0066cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="أجواء الصيف">
  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      align-items: start;
    }
    .profile-sidebar {
      position: sticky;
      top: 90px;
    }
    .profile-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-100);
      overflow: hidden;
    }
    .profile-card-header {
      background: var(--gradient-primary);
      padding: 32px 24px;
      text-align: center;
      color: var(--white);
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: 3px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      margin: 0 auto 14px;
      color: var(--white);
    }
    .profile-card-header h2 {
      font-size: 1.15rem;
      font-weight: 800;
    }
    .profile-card-header p {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-top: 4px;
    }
    .profile-card-body {
      padding: 20px;
    }
    .profile-info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 0.88rem;
      color: var(--gray-700);
    }
    .profile-info-item:last-child { border-bottom: none; }
    .profile-info-item i {
      width: 32px;
      height: 32px;
      background: rgba(0,123,255,0.08);
      color: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.82rem;
    }
    .profile-nav {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .profile-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray-600);
      cursor: pointer;
      transition: all var(--transition-fast);
      background: none;
      border: none;
      width: 100%;
      text-align: right;
    }
    .profile-nav-item:hover { background: var(--gray-50); color: var(--primary); }
    .profile-nav-item.active { background: rgba(0,123,255,0.08); color: var(--primary); }
    .profile-nav-item.logout { color: var(--danger); }
    .profile-nav-item.logout:hover { background: rgba(239,68,68,0.08); }
    .profile-nav-item i { width: 20px; text-align: center; }
    .notif-btn-on  { color: #10b981 !important; background: rgba(16,185,129,0.08) !important; }
    .notif-btn-off { color: var(--gray-500); }
    .notif-btn-denied { color: var(--danger) !important; cursor: default !important; }

    .content-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-100);
      padding: 28px;
    }
    .content-card h2 {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .content-card h2 i {
      color: var(--primary);
      font-size: 1.05rem;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Orders */
    .order-card {
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 16px;
      transition: all var(--transition-normal);
    }
    .order-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-sm); }
    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .order-num {
      font-weight: 800;
      color: var(--primary-dark);
      font-size: 1rem;
    }
    .order-date {
      font-size: 0.8rem;
      color: var(--gray-400);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .order-items-mini {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .order-item-chip {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 0.78rem;
      color: var(--gray-600);
    }
    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-total {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--primary-dark);
    }
    .order-payment {
      font-size: 0.8rem;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
    }
    .empty-state i {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
      opacity: 0.5;
    }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--gray-600); }
    .empty-state p { font-size: 0.9rem; margin-bottom: 20px; }

    /* Edit Profile */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .save-success {
      background: rgba(16,185,129,0.08);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.2);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .save-success.show { display: flex; }

    @media(max-width: 900px) {
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<section style="padding:40px 0 80px;">
  <div class="container">
    <div class="profile-layout" id="profileLayout">

      <!-- Sidebar -->
      <div class="profile-sidebar" data-aos="fade-left">
        <div class="profile-card">
          <div class="profile-card-header">
            <div class="profile-avatar" id="avatarLetter">م</div>
            <h2 id="sidebarName">...</h2>
            <p id="sidebarEmail">...</p>
          </div>
          <div class="profile-card-body">
            <div class="profile-info-item">
              <i class="fas fa-phone"></i>
              <span id="sidebarPhone">-</span>
            </div>
            <div class="profile-info-item">
              <i class="fas fa-calendar-alt"></i>
              <span id="sidebarJoined">-</span>
            </div>
            <div class="profile-info-item">
              <i class="fas fa-shopping-bag"></i>
              <span id="sidebarOrderCount">0 طلبات</span>
            </div>
          </div>
          <div class="profile-nav" style="padding:0 16px 16px;">
            <button class="profile-nav-item active" id="navOrders" onclick="switchTab('orders')">
              <i class="fas fa-box"></i> طلباتي
            </button>
            <button class="profile-nav-item" id="navBookings" onclick="switchTab('bookings')">
              <i class="fas fa-calendar-check"></i> حجوزات الصيانة
            </button>
            <button class="profile-nav-item" id="navEdit" onclick="switchTab('edit')">
              <i class="fas fa-edit"></i> تعديل البيانات
            </button>
            <a href="products.html" class="profile-nav-item" style="text-decoration:none;">
              <i class="fas fa-shopping-bag"></i> تسوق الآن
            </a>
            <button class="profile-nav-item notif-btn-off" id="notifToggleBtn" onclick="handleNotifToggle()">
              <i class="fas fa-bell-slash" id="notifBtnIcon"></i>
              <span id="notifBtnText">تفعيل الإشعارات</span>

            <button class="profile-nav-item logout" onclick="logoutUser()">

          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div data-aos="fade-right">

        <!-- Orders Tab -->
        <div class="content-card tab-content active" id="tabOrders">

          <div id="ordersList"></div>
        </div>

        <!-- Bookings Tab -->
        <div class="content-card tab-content" id="tabBookings">
          <h2><i class="fas fa-calendar-check"></i> حجوزات الصيانة</h2>

        </div>

        <!-- Edit Profile Tab -->
        <div class="content-card tab-content" id="tabEdit">
          <h2><i class="fas fa-edit"></i> تعديل البيانات</h2>
          <form onsubmit="saveProfile(event)">
            <div class="form-row">

                <label>الاسم الكامل *</label>
                <input type="text" class="form-control" id="editName" required>

              <div class="form-group">

                <input type="tel" class="form-control" id="editPhone" required>
              </div>
            </div>
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" class="form-control" id="editEmail" disabled style="background:var(--gray-50);color:var(--gray-500);">

              <i class="fas fa-save"></i> حفظ التغييرات
            </button>
            <div class="save-success" id="saveSuccess">
              <i class="fas fa-check-circle"></i> تم حفظ التغييرات بنجاح!
            </div>
          </form>
        </div>

      </div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/main.js"></script>
<script>
  // ─── Wait for Firebase auth before anything ───
  onAuthReady(async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    requestPushPermission().catch(() => {});
    _updateNotifBtn();

    // Fill sidebar
    document.getElementById('avatarLetter').textContent  = (user.name || 'م').charAt(0);
    document.getElementById('sidebarName').textContent   = user.name  || '-';
    document.getElementById('sidebarEmail').textContent  = user.email || '-';
    document.getElementById('sidebarPhone').textContent  = user.phone || 'غير محدد';
    const joinDate = user.createdAt?.toDate ? user.createdAt.toDate() : new Date();
    document.getElementById('sidebarJoined').textContent = 'عضو منذ: ' + joinDate.toLocaleDateString('ar-SA', { year:'numeric', month:'long' });

    // Fill edit form
    document.getElementById('editName').value  = user.name  || '';
    document.getElementById('editPhone').value = user.phone || '';
    document.getElementById('editEmail').value = user.email || '';

    await loadOrders(user);
    await loadBookings(user);
  });

  let _profileOrdersUnsub = null;
  function loadOrders(user) {
    if (_profileOrdersUnsub) { _profileOrdersUnsub(); _profileOrdersUnsub = null; }
    const container = document.getElementById('ordersList');
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray-400);"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

    const paymentMap = { cash: 'الدفع عند الاستلام', mada: 'مدى / بطاقة ائتمان', applepay: 'Apple Pay' };

    _profileOrdersUnsub = db.collection('orders').where('userId', '==', user.uid)
      .onSnapshot((snapshot) => {
        const userOrders = snapshot.docs
          .map(d => ({ firestoreId: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        document.getElementById('sidebarOrderCount').textContent = userOrders.length + ' طلبات';

        if (userOrders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-box-open"></i>
              <h3>لا توجد طلبات بعد</h3>
              <p>اطلب منتجاً من المتجر وستظهر طلباتك هنا</p>
              <a href="products.html" class="btn btn-primary"><i class="fas fa-shopping-bag"></i> تسوق الآن</a>
            </div>`;
          return;
        }

        container.innerHTML = userOrders.map(order => {
          const st      = getStatusLabel(order.status);
          const d       = order.createdAt?.toDate ? order.createdAt.toDate() : new Date();
          const dateStr = d.toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });
          const itemsHtml = (order.items || []).map(it =>
            `<span class="order-item-chip">${it.name.split(' ').slice(0,3).join(' ')} x${it.qty}</span>`
          ).join('');
          return `
            <div class="order-card">
              <div class="order-card-header">
                <div>
                  <div class="order-num">#${order.orderNum}</div>
                  <div class="order-date">${dateStr}</div>
                </div>
                <span class="status-badge" style="background:${st.color}22;color:${st.color};border:1px solid ${st.color}44;">
                  <i class="fas fa-circle" style="font-size:0.5rem;"></i>${st.label}
                </span>
              </div>
              <div class="order-items-mini">${itemsHtml || '<span class="order-item-chip">لا توجد منتجات</span>'}</div>
              <div class="order-footer">
                <span class="order-total">${(order.total || 0).toLocaleString()} ريال</span>
                <span class="order-payment"><i class="fas fa-credit-card"></i> ${paymentMap[order.payment] || order.payment || 'غير محدد'}</span>
              </div>
            </div>`;
        }).join('');
      }, () => {
        container.innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;">خطأ في تحميل الطلبات</div>';
      });
  }

  let _profileBookingsUnsub = null;
  function loadBookings(user) {
    if (_profileBookingsUnsub) { _profileBookingsUnsub(); _profileBookingsUnsub = null; }
    const container = document.getElementById('bookingsList');
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray-400);"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

    _profileBookingsUnsub = db.collection('bookings').where('userId', '==', user.uid)
      .onSnapshot((snap) => {
        if (snap.empty) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-tools"></i>
              <h3>لا توجد حجوزات صيانة بعد</h3>
              <p>يمكنك طلب صيانة أو تركيب لتكييفك الآن</p>
              <a href="booking.html" class="btn btn-primary"><i class="fas fa-calendar-plus"></i> احجز صيانة</a>
            </div>`;
          return;
        }

        const bookings = snap.docs.map(doc => doc.data());
        bookings.sort((a, b) => {
          const t1 = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
          const t2 = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
          return t2 - t1;
        });

        container.innerHTML = bookings.map(bk => {
          const dateStr = bk.createdAt?.toDate ? bk.createdAt.toDate().toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' }) : 'غير متوفر';
          let stLabel = 'قيد الانتظار';
          let stColor = '#f59e0b';
          if (bk.status === 'confirmed')      { stLabel = 'تم التأكيد'; stColor = '#3b82f6'; }
          else if (bk.status === 'completed') { stLabel = 'مكتمل';      stColor = '#10b981'; }
          else if (bk.status === 'cancelled') { stLabel = 'ملغى';       stColor = '#ef4444'; }

          return `
            <div class="order-card">
              <div class="order-card-header">
                <div>
                  <div class="order-num">رقم التتبع: #${bk.trackId || 'غير متوفر'}</div>
                  <div class="order-date">تاريخ الطلب: ${dateStr}</div>
                </div>
                <span class="status-badge" style="background:${stColor}22;color:${stColor};border:1px solid ${stColor}44;">
                  <i class="fas fa-circle" style="font-size:0.5rem;"></i> ${stLabel}
                </span>
              </div>
              <div class="order-items-mini">
                <span class="order-item-chip"><i class="fas fa-wrench"></i> ${bk.acType || 'خدمة صيانة'}</span>
                <span class="order-item-chip"><i class="fas fa-calendar-day"></i> الموعد: ${bk.date || '-'} - ${bk.time || '-'}</span>
              </div>
              <div class="order-footer" style="padding-top:12px;border-top:1px solid var(--gray-100);font-size:0.9rem;color:var(--gray-600);">
                <i class="fas fa-map-marker-alt"></i> ${bk.address || 'العنوان غير مسجل'}
              </div>
            </div>`;
        }).join('');
      }, (e) => {
        console.error(e);
        container.innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;">خطأ في تحميل الحجوزات</div>';
      });
  }

  function switchTab(tab) {
    ['orders', 'bookings', 'edit'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
      document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
    });
  }

  async function saveProfile(e) {
    e.preventDefault();
    const user     = getCurrentUser();
    if (!user) return;
    const newName  = document.getElementById('editName').value.trim();
    const newPhone = document.getElementById('editPhone').value.trim();
    if (!newName) { showToast('يرجى إدخال الاسم'); return; }

    try {
      await updateUserProfile(user.uid, { name: newName, phone: newPhone });
      document.getElementById('sidebarName').textContent  = newName;
      document.getElementById('avatarLetter').textContent = newName.charAt(0);
      document.getElementById('sidebarPhone').textContent = newPhone || 'غير محدد';
      updateNavbarAuth();
      const successEl = document.getElementById('saveSuccess');
      successEl.classList.add('show');
      setTimeout(() => successEl.classList.remove('show'), 3000);
    } catch (err) {
      showToast('خطأ في الحفظ: ' + err.message);
    }
  }

  function _updateNotifBtn() {
    const btn  = document.getElementById('notifToggleBtn');
    const icon = document.getElementById('notifBtnIcon');
    const text = document.getElementById('notifBtnText');
    if (!btn || !('Notification' in window)) return;
    const perm = Notification.permission;
    btn.className = 'profile-nav-item';
    if (perm === 'granted') {
      btn.classList.add('notif-btn-on');
      icon.className = 'fas fa-bell';
      text.textContent = 'الإشعارات مفعّلة';
    } else if (perm === 'denied') {
      btn.classList.add('notif-btn-denied');
      icon.className = 'fas fa-bell-slash';
      text.textContent = 'الإشعارات محجوبة';
    } else {
      btn.classList.add('notif-btn-off');
      icon.className = 'fas fa-bell-slash';
      text.textContent = 'تفعيل الإشعارات';
    }
  }

  async function handleNotifToggle() {
    const perm = Notification.permission;
    if (perm === 'denied') {
      showToast('الإشعارات محجوبة — افتح إعدادات المتصفح وافعّلها يدوياً');
      return;
    }
    if (perm === 'granted') {
      showToast('الإشعارات مفعّلة بالفعل ✓');
      return;
    }
    await requestPushPermission().catch(() => {});
    _updateNotifBtn();
    if (Notification.permission === 'granted') showToast('تم تفعيل الإشعارات ✓');
  }
</script>
</body>
