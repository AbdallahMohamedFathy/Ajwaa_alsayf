<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | أجواء الصيف للتكييف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="assets/images/logo.png">
  <style>
    .auth-page {
      min-height: 100vh;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.5s ease;
    }
    .auth-header {
      background: var(--gradient-primary);
      padding: 36px 32px;
      text-align: center;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .auth-header::before {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 60px;
      background: var(--white);
      border-radius: 50% 50% 0 0;
    }
    .auth-header img {
      height: 64px;
      margin-bottom: 14px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }
    .auth-header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      position: relative;
    }
    .auth-header p {
      opacity: 0.88;
      font-size: 0.88rem;
      margin-top: 4px;
      position: relative;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--gray-100);
      margin-top: 8px;
    }
    .auth-tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--gray-500);
      cursor: pointer;
      transition: all var(--transition-normal);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: rgba(0,123,255,0.04);
    }
    .auth-body { padding: 28px 32px 32px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .input-icon { position: relative; }
    .input-icon > i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 0.88rem;
      pointer-events: none;
    }
    .input-icon .form-control { padding-right: 40px; }
    .password-toggle {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.88rem;
      padding: 4px;
      transition: color var(--transition-fast);
    }
    .password-toggle:hover { color: var(--primary); }
    .form-error {
      background: rgba(239,68,68,0.08);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .form-error.show { display: flex; }
    .auth-link {
      text-align: center;
      margin-top: 18px;
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    .auth-link a {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }
    .auth-link a:hover { text-decoration: underline; }
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      background: var(--white);
      color: var(--gray-700);
      font-family: 'Cairo', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-normal);
      margin-bottom: 18px;
    }
    .google-btn:hover {
      border-color: #4285f4;
      background: rgba(66,133,244,0.04);
      color: #4285f4;
      box-shadow: 0 2px 12px rgba(66,133,244,0.15);
    }
    .google-btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .google-btn svg { flex-shrink: 0; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--gray-400);
      font-size: 0.82rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }
    @media(max-width:480px) {
      .auth-body { padding: 20px; }
      .auth-header { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="container">
    <a href="index.html" class="navbar-logo"><img src="assets/images/logo.png" alt="أجواء الصيف"></a>
    <div class="navbar-menu" id="navMenu">
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="services.html">الخدمات</a>
      <a href="booking.html">احجز صيانة</a>
    </div>
    <div class="navbar-actions">
      <div id="navbarAuth"></div>
      <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <img src="assets/images/logo.png" alt="أجواء الصيف">
      <h1>مرحباً بك في أجواء الصيف</h1>
      <p>تسجيل الدخول لمتابعة طلباتك والاستفادة من العروض</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">
        <i class="fas fa-user-plus"></i> حساب جديد
      </button>
    </div>

    <div class="auth-body">
      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div id="loginError" class="form-error">
          <i class="fas fa-exclamation-circle"></i><span></span>
        </div>
        <button type="button" class="google-btn" id="googleLoginBtn" onclick="handleGoogleSignIn()">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          تسجيل الدخول بـ Google
        </button>
        <div class="auth-divider">أو بالبريد الإلكتروني</div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" id="loginEmail" placeholder="email@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:4px;" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
        <p class="auth-link">
          ليس لديك حساب؟ <a onclick="switchTab('register')">أنشئ حساباً الآن</a>
        </p>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div id="registerError" class="form-error">
          <i class="fas fa-exclamation-circle"></i><span></span>
        </div>
        <button type="button" class="google-btn" id="googleRegisterBtn" onclick="handleGoogleSignIn()">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          التسجيل بـ Google
        </button>
        <div class="auth-divider">أو بالبريد الإلكتروني</div>
        <div class="form-group">
          <label>الاسم الكامل *</label>
          <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control" id="regName" placeholder="محمد أحمد" required autocomplete="name">
          </div>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني *</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" id="regEmail" placeholder="email@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label>رقم الهاتف *</label>
          <div class="input-icon">
            <i class="fas fa-phone"></i>
            <input type="tel" class="form-control" id="regPhone" placeholder="05xxxxxxxx" required>
          </div>
        </div>
        <div class="form-group">
          <label>كلمة المرور * <span style="font-size:0.75rem;color:var(--gray-400);font-weight:400;">(8 أحرف على الأقل)</span></label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required minlength="8">
            <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:4px;" id="registerBtn">
          <i class="fas fa-user-plus"></i> إنشاء الحساب
        </button>
        <p class="auth-link">
          لديك حساب بالفعل؟ <a onclick="switchTab('login')">تسجيل الدخول</a>
        </p>
      </form>
    </div>
  </div>
</div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/main.js"></script>
<script>
  const _urlParams     = new URLSearchParams(window.location.search);
  const _redirectMap = { checkout: 'checkout.html', booking: 'booking.html' };
  const _redirectTarget = _redirectMap[_urlParams.get('redirect')] || 'profile.html';

  // Redirect if already logged in (wait for Firebase auth)
  onAuthReady((user) => {
    if (user) {
      if (isAdmin()) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = _redirectTarget;
      }
    }
  });

  // Tab param
  if (_urlParams.get('tab') === 'register') switchTab('register');

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('registerError').classList.remove('show');
  }

  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('i');
    input.type      = input.type === 'password' ? 'text' : 'password';
    icon.className  = input.type === 'text' ? 'far fa-eye-slash' : 'far fa-eye';
  }

  function showFormError(errorId, message) {
    const el = document.getElementById(errorId);
    el.querySelector('span').textContent = message;
    el.classList.add('show');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';

    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const result   = await loginUser(email, password);

    if (result.success) {
      showToast('مرحباً بعودتك! تم تسجيل الدخول بنجاح ✓');
      setTimeout(() => {
        window.location.href = isAdmin() ? 'admin.html' : _redirectTarget;
      }, 900);
    } else {
      showFormError('loginError', result.error);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
    }
  }

  async function handleGoogleSignIn() {
    const btns = [document.getElementById('googleLoginBtn'), document.getElementById('googleRegisterBtn')];
    btns.forEach(b => { if (b) { b.disabled = true; b.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاتصال...'; } });

    const result = await loginWithGoogle();

    if (result.success) {
      showToast('تم تسجيل الدخول بـ Google بنجاح ✓');
      setTimeout(() => {
        window.location.href = isAdmin() ? 'admin.html' : _redirectTarget;
      }, 900);
    } else {
      btns.forEach(b => {
        if (!b) return;
        const isLogin = b.id === 'googleLoginBtn';
        b.disabled = false;
        b.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> ${isLogin ? 'تسجيل الدخول بـ Google' : 'التسجيل بـ Google'}`;
      });
      if (result.error) showFormError('loginError', result.error);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';

    const name     = document.getElementById('regName').value;
    const email    = document.getElementById('regEmail').value;
    const phone    = document.getElementById('regPhone').value;
    const password = document.getElementById('regPassword').value;
    const result   = await registerUser(name, email, phone, password);

    if (result.success) {
      showToast('تم إنشاء حسابك بنجاح! مرحباً بك ✓');
      setTimeout(() => { window.location.href = _redirectTarget; }, 900);
    } else {
      showFormError('registerError', result.error);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
    }
  }
</script>
</body>
</html>
