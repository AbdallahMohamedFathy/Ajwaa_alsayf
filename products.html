  <div class="breadcrumb"><a href="index.html">الرئيسية</a><span>/</span><span>المنتجات</span></div>

<!-- Shop Content -->
<section style="padding:var(--section-padding);">
  <div class="container">
    <div class="shop-layout">
      <!-- Sidebar Filters -->
      <aside class="shop-sidebar" id="shopSidebar">
        <div class="filter-card">
          <h3><i class="fas fa-search"></i> بحث</h3>
          <div class="shop-search" style="position:relative;">
            <input type="text" id="searchInput" placeholder="ابحث عن تكييف..." oninput="filterProducts(); updateSuggestions(this.value)" onkeydown="handleSearchKey(event)" autocomplete="off">
            <i class="fas fa-search"></i>
            <div id="searchSuggestions" style="display:none;position:absolute;top:100%;right:0;left:0;z-index:200;background:var(--white);border:2px solid var(--primary);border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);box-shadow:var(--shadow-lg);max-height:260px;overflow-y:auto;margin-top:-2px;"></div>
          </div>
        </div>

        <div class="filter-card">
          <h3><i class="fas fa-building"></i> الماركة</h3>
          <label class="filter-option"><input type="checkbox" value="Carrier" onchange="filterProducts()"> Carrier</label>
          <label class="filter-option"><input type="checkbox" value="Sharp" onchange="filterProducts()"> Sharp</label>
          <label class="filter-option"><input type="checkbox" value="LG" onchange="filterProducts()"> LG</label>
          <label class="filter-option"><input type="checkbox" value="Tornado" onchange="filterProducts()"> Tornado</label>
          <label class="filter-option"><input type="checkbox" value="Fresh" onchange="filterProducts()"> Fresh</label>
          <label class="filter-option"><input type="checkbox" value="Midea" onchange="filterProducts()"> Midea</label>
        </div>

        <div class="filter-card">
          <h3><i class="fas fa-horse"></i> القدرة (حصان)</h3>
          <label class="filter-option"><input type="checkbox" value="1.5" onchange="filterProducts()"> 1.5 حصان</label>
          <label class="filter-option"><input type="checkbox" value="2.25" onchange="filterProducts()"> 2.25 حصان</label>
          <label class="filter-option"><input type="checkbox" value="3" onchange="filterProducts()"> 3 حصان</label>
        </div>

        <div class="filter-card">
          <h3><i class="fas fa-bolt"></i> نوع التكييف</h3>
          <label class="filter-option"><input type="checkbox" id="inverterFilter" onchange="filterProducts()"> انفرتر فقط</label>
        </div>

        <div class="filter-card">
          <h3><i class="fas fa-money-bill"></i> السعر</h3>
          <div class="price-range">
            <input type="number" id="priceMin" placeholder="من" oninput="filterProducts()">
            <span>-</span>
            <input type="number" id="priceMax" placeholder="إلى" oninput="filterProducts()">
          </div>
        </div>

        <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="resetFilters()">
          <i class="fas fa-redo"></i> إعادة تعيين
        </button>
      </aside>

      <!-- Products Grid -->
      <div class="shop-main">
        <div class="shop-toolbar">
          <button class="filter-toggle" onclick="document.getElementById('shopSidebar').classList.toggle('active')">

          <select class="sort-select" id="sortSelect" onchange="filterProducts()">

            <option value="price-desc">السعر: من الأعلى</option>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="assets/js/main.js"></script>
<script>
// Shop Page Logic
function filterProducts() {
  let filtered = [...productsData];
  // Search
  const search = document.getElementById('searchInput')?.value.toLowerCase();
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.brand.toLowerCase().includes(search));
  // Brand
  const brands = [...document.querySelectorAll('.filter-card:nth-child(2) input:checked')].map(i => i.value);
  if (brands.length) filtered = filtered.filter(p => brands.includes(p.brand));
  // HP
  const hps = [...document.querySelectorAll('.filter-card:nth-child(3) input:checked')].map(i => i.value);
  if (hps.length) filtered = filtered.filter(p => hps.includes(p.hp));
  // Inverter
  if (document.getElementById('inverterFilter')?.checked) filtered = filtered.filter(p => p.inverter);
  // Price
  const min = parseFloat(document.getElementById('priceMin')?.value) || 0;
  const max = parseFloat(document.getElementById('priceMax')?.value) || Infinity;
  filtered = filtered.filter(p => p.price >= min && p.price <= max);
  // Sort
  const sort = document.getElementById('sortSelect')?.value;
  if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') filtered.sort((a,b) => b.rating - a.rating);
  else if (sort === 'discount') filtered.sort((a,b) => b.discount - a.discount);

  renderProducts('all-products', filtered);
  document.getElementById('resultsCount').textContent = filtered.length + ' منتجات';
  if (typeof AOS !== 'undefined') AOS.refresh();
}

function resetFilters() {
  document.querySelectorAll('.shop-sidebar input').forEach(i => { i.checked = false; i.value = i.type === 'number' ? '' : i.value; });
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('sortSelect').value = 'default';
  filterProducts();
}

// Initial render
filterProducts();

// Search Autocomplete
function updateSuggestions(val) {
  const suggestions = document.getElementById('searchSuggestions');
  const trimmed = val.trim().toLowerCase();
  if (trimmed.length < 2) { suggestions.style.display = 'none'; return; }

  const matches = productsData.filter(p =>
    p.name.toLowerCase().includes(trimmed) || p.brand.toLowerCase().includes(trimmed)
  ).slice(0, 5);

  if (!matches.length) { suggestions.style.display = 'none'; return; }

  suggestions.innerHTML = matches.map((p, i) => `
    <div class="suggestion-item" data-index="${i}" onclick="selectSuggestion('${p.name.replace(/'/g,'&#39;')}')"
      style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100);transition:background 0.15s;font-size:0.875rem;color:var(--gray-700);"
      onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background=''">
      <img src="${p.image}" alt="" style="width:36px;height:36px;object-fit:contain;flex-shrink:0;background:var(--gray-50);border-radius:6px;padding:2px;">
      <span style="flex:1;line-height:1.3;">${p.name}</span>
      <span style="font-size:0.78rem;color:var(--primary);font-weight:700;white-space:nowrap;">${p.price.toLocaleString()} ر.س</span>
    </div>
  `).join('');
  suggestions.style.display = 'block';
}

function selectSuggestion(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('searchSuggestions').style.display = 'none';
  filterProducts();
}

function handleSearchKey(e) {
  if (e.key === 'Escape') {
    document.getElementById('searchSuggestions').style.display = 'none';
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.shop-search')) {
    document.getElementById('searchSuggestions').style.display = 'none';
  }
});
</script>
