<style>
/* ══════════════ Portfolio Page ══════════════ */

/* Filter Bar */
.portfolio-filters {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; flex-wrap: wrap; margin: 36px 0 28px;
}
.filter-btn {
  padding: 9px 22px; border-radius: var(--radius-full);
  border: 1.5px solid var(--gray-200); background: var(--white);
  color: var(--gray-600); font-family: var(--font-primary);
  font-size: 0.88rem; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease; display: flex; align-items: center; gap: 7px;
  box-shadow: var(--shadow-sm);
}
.filter-btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f8ff; }
.filter-btn.active {
  background: var(--primary); border-color: var(--primary);
  color: var(--white); box-shadow: 0 4px 16px rgba(0,123,255,0.35);
}
.filter-count {
  background: rgba(255,255,255,0.3); border-radius: 20px;
  padding: 1px 8px; font-size: 0.75rem; font-weight: 700;
}
.filter-btn:not(.active) .filter-count {
  background: var(--gray-100); color: var(--gray-500);
}

/* Photos Grid */
.photos-section { padding: 0 0 80px; }
.photos-grid {
  columns: 4 280px; column-gap: 16px;
}
.photo-card {
  break-inside: avoid; margin-bottom: 16px;
  border-radius: var(--radius-lg); overflow: hidden;
  position: relative; cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.photo-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
.photo-card img {
  width: 100%; display: block; transition: transform 0.4s ease;
}
.photo-card:hover img { transform: scale(1.05); }
.photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s ease;
  display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
}
.photo-card:hover .photo-overlay { opacity: 1; }
.photo-overlay h4 { color: #fff; font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
.photo-overlay p { color: rgba(255,255,255,0.75); font-size: 0.78rem; }
.photo-overlay .po-meta { color: rgba(255,255,255,0.6); font-size: 0.72rem; margin-top: 6px; }
.photo-badge {
  position: absolute; top: 12px; right: 12px;
  padding: 4px 12px; border-radius: var(--radius-full);
  font-size: 0.72rem; font-weight: 700; color: #fff;
}
.photo-expand {
  position: absolute; top: 12px; left: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s ease;
}
.photo-card:hover .photo-expand { opacity: 1; }

/* Placeholder card (no image) */
.photo-placeholder {
  min-height: 200px;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; color: rgba(0,75,173,0.2);
}

/* Empty State */
.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--gray-400);
}
.empty-state i { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 1.2rem; color: var(--gray-500); }

/* Videos Section */
.videos-section { background: var(--gray-50); padding: 60px 0; }
.videos-section .section-header { margin-bottom: 40px; }
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}
.video-card {
  background: var(--white); border-radius: var(--radius-xl);
  overflow: hidden; box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-100);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.video-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-xl); }
.video-thumb {
  position: relative; background: var(--gray-900);
  aspect-ratio: 16/9; cursor: pointer; overflow: hidden;
}
.video-thumb video, .video-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity 0.3s ease;
}
.video-play-btn {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3); transition: background 0.3s ease;
}
.video-card:hover .video-play-btn { background: rgba(0,0,0,0.15); }
.play-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 1.5rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
  padding-right: 4px;
}
.video-card:hover .play-icon { transform: scale(1.1); }
.video-badge {
  position: absolute; top: 12px; right: 12px;
  padding: 4px 12px; border-radius: var(--radius-full);
  font-size: 0.72rem; font-weight: 700; color: #fff;
}
.video-duration {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(0,0,0,0.7); color: #fff;
  font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 6px;
}
.video-body { padding: 18px 20px; }
.video-body h4 { font-size: 1rem; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
.video-body p { font-size: 0.85rem; color: var(--gray-500); line-height: 1.6; }
.video-meta { display: flex; align-items: center; gap: 6px; color: var(--gray-400); font-size: 0.78rem; margin-top: 12px; }
.video-meta i { color: var(--primary); }

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox-inner { position: relative; max-width: 90vw; max-height: 90vh; }
.lightbox-inner img {
  max-width: 90vw; max-height: 85vh;
  border-radius: var(--radius-lg); box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  object-fit: contain;
}
.lightbox-close {
  position: fixed; top: 20px; left: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: background 0.2s ease;
}
.lightbox-close:hover { background: rgba(255,255,255,0.3); }
.lightbox-info {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
  color: #fff; padding: 12px 24px; border-radius: var(--radius-full);
  text-align: center; font-size: 0.9rem;
}
.lightbox-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: background 0.2s ease;
}
.lightbox-nav:hover { background: rgba(255,255,255,0.3); }
.lightbox-prev { right: 20px; }
.lightbox-next { left: 20px; }

/* Video Modal */
.video-modal {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
}
.video-modal.active { display: flex; }
.video-modal video {
  max-width: 90vw; max-height: 85vh;
  border-radius: var(--radius-lg); box-shadow: 0 32px 80px rgba(0,0,0,0.5);
}
.video-modal-close {
  position: fixed; top: 20px; left: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}

/* Loading Skeleton */
.skeleton-grid {
  columns: 4 280px; column-gap: 16px;
}
.skeleton-card {
  break-inside: avoid; margin-bottom: 16px;
  border-radius: var(--radius-lg); overflow: hidden;
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

@media (max-width: 768px) {
  .photos-grid { columns: 2 160px; }
  .videos-grid { grid-template-columns: 1fr; }
  .portfolio-hero { padding: 80px 0 40px; }
}
@media (max-width: 480px) {
  .photos-grid { columns: 1; }
}
</style>

<script>
AOS.init({ duration: 700, once: true });

let allItems = [];
let photoItems = [];
let currentLightboxIndex = 0;

async function loadPortfolio() {
  try {
    allItems = await getPortfolioItems();
  } catch(e) {
    allItems = [];
  }

  photoItems = allItems.filter(i => i.type === 'photo');
  const videoItems = allItems.filter(i => i.type === 'video');

  // Update stats
  document.getElementById('statPhotos').textContent = photoItems.length;
  document.getElementById('statVideos').textContent = videoItems.length;
  document.getElementById('countAll').textContent = allItems.length;
  document.getElementById('countPhotos').textContent = photoItems.length;
  document.getElementById('countVideos').textContent = videoItems.length;

  renderPhotos(photoItems);
  renderVideos(videoItems);

  if (videoItems.length > 0) {
    document.getElementById('videosSection').style.display = 'block';
  }
}

function renderPhotos(items) {
  const grid = document.getElementById('photosGrid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="column-span:all;">
      <i class="fas fa-camera-retro"></i>
      <h3>لا توجد صور بعد</h3>
    </div>`;
    return;
  }
  grid.innerHTML = items.map((item, idx) => `
    <div class="photo-card" onclick="openLightbox(${idx})" data-aos="fade-up">
      ${item.mediaUrl
        ? `<img src="${item.mediaUrl}" alt="${item.title}" loading="lazy">`
        : `<div class="photo-placeholder"><i class="fas fa-image"></i></div>`}
      <span class="photo-badge" style="background:${item.badgeColor || '#007BFF'};">${item.badge || ''}</span>
      <div class="photo-expand"><i class="fas fa-expand"></i></div>
      <div class="photo-overlay">
        <h4>${item.title}</h4>
        <p>${item.description || ''}</p>
        ${item.location ? `<div class="po-meta"><i class="fas fa-map-marker-alt"></i> ${item.location}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function renderVideos(items) {
  const grid = document.getElementById('videosGrid');
  if (!items.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = items.map(item => `
    <div class="video-card" data-aos="fade-up">
      <div class="video-thumb" onclick="openVideoModal('${item.mediaUrl}')">
        ${item.thumbnailUrl
          ? `<img src="${item.thumbnailUrl}" alt="${item.title}">`
          : `<div style="width:100%;height:100%;background:var(--gradient-dark);display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,0.2);"><i class="fas fa-film"></i></div>`}
        <div class="video-play-btn">
          <div class="play-icon"><i class="fas fa-play"></i></div>
        </div>
        <span class="video-badge" style="background:${item.badgeColor || '#007BFF'};">${item.badge || ''}</span>
      </div>
      <div class="video-body">
        <h4>${item.title}</h4>
        ${item.description ? `<p>${item.description}</p>` : ''}
        ${item.location ? `<div class="video-meta"><i class="fas fa-map-marker-alt"></i> ${item.location}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function filterPortfolio(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const filtered = type === 'all'
    ? allItems.filter(i => i.type === 'photo')
    : type === 'photo'
      ? allItems.filter(i => i.type === 'photo')
      : [];

  renderPhotos(filtered);

  const videoSection = document.getElementById('videosSection');
  if (type === 'all' || type === 'video') {
    const videos = allItems.filter(i => i.type === 'video');
    renderVideos(videos);
    videoSection.style.display = videos.length ? 'block' : 'none';
  } else {
    videoSection.style.display = 'none';
  }

  if (type === 'video') {
    document.getElementById('photosSection').style.display = 'none';
    videoSection.style.display = 'block';
  } else {
    document.getElementById('photosSection').style.display = 'block';
  }
}

// Lightbox
function openLightbox(idx) {
  currentLightboxIndex = idx;
  const item = photoItems[idx];
  if (!item || !item.mediaUrl) return;
  document.getElementById('lightboxImg').src = item.mediaUrl;
  document.getElementById('lightboxInfo').innerHTML =
    `<strong>${item.title}</strong>${item.location ? ' &nbsp;·&nbsp; <i class="fas fa-map-marker-alt"></i> ' + item.location : ''}`;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function lightboxNav(dir) {
  currentLightboxIndex = (currentLightboxIndex + dir + photoItems.length) % photoItems.length;
  openLightbox(currentLightboxIndex);
}

function closeLightbox(e) {
  if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
}
function closeLightboxBtn() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

// Video Modal
function openVideoModal(url) {
  if (!url) return;
  const vid = document.getElementById('modalVideo');
  vid.src = url;
  vid.play();
  document.getElementById('videoModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeVideoModal(e) {
  if (e.target === document.getElementById('videoModal')) closeVideoModalBtn();
}
function closeVideoModalBtn() {
  const vid = document.getElementById('modalVideo');
  vid.pause(); vid.src = '';
  document.getElementById('videoModal').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightboxBtn(); closeVideoModalBtn(); }
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
});

loadPortfolio();
</script>
