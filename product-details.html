<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="تفاصيل المنتج - أجواء الصيف للتكييف">
  <title>تفاصيل المنتج | أجواء الصيف للتكييف</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="assets/images/logo.png">
</head>
<body>

<div class="loading-screen" id="loading"><div class="loading-spinner"></div><p>جاري التحميل...</p></div>

<nav class="navbar scrolled" id="navbar">
  <div class="container">
    <a href="index.html" class="navbar-logo"><img src="assets/images/logo.png" alt="أجواء الصيف"></a>
    <div class="navbar-menu" id="navMenu">
      <a href="index.html">الرئيسية</a>
      <a href="products.html" class="active">المنتجات</a>
      <a href="services.html">الخدمات</a>
      <a href="booking.html">احجز صيانة</a>
    </div>
    <div class="navbar-actions">

      <a href="#" class="cart-icon" id="cartToggle"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>
      <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="menu-overlay" id="menuOverlay"></div>

<section class="product-details-section">
  <div class="container">
    <div class="product-details-grid" id="productDetail">
      <!-- JS renders content -->
    </div>

    <!-- Related Products -->
    <div style="margin-top:60px;">
      <div class="section-header">
        <h2 class="section-title">منتجات <span>مشابهة</span></h2>
      </div>
      <div class="products-grid" id="related-products"></div>
    </div>

    <!-- Recently Viewed Products -->
    <div style="margin-top:60px; margin-bottom: 40px;">
      <div class="section-header">
        <h2 class="section-title">منتجات <span>شاهدتها مؤخراً</span></h2>
      </div>
      <div class="products-grid" id="recently-viewed-grid"></div>
    </div>
  </div>
</section>

<!-- Cart Drawer -->
<div class="cart-drawer-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header">
    <h3><i class="fas fa-shopping-cart"></i> سلة المشتريات</h3>
    <button class="cart-drawer-close" id="cartClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-drawer-items"></div>
  <div class="cart-drawer-footer">
    <div class="cart-total"><span>الإجمالي:</span><span class="cart-total-price">0 ريال</span></div>
    <a href="checkout.html" class="btn btn-primary" style="width:100%;">إتمام الشراء</a>
  </div>
</div>

<a href="https://wa.me/966530656834" target="_blank" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>
<button class="scroll-top"><i class="fas fa-chevron-up"></i></button>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/main.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = parseInt(params.get('id')) || 1;
  const product = productsData.find(p => p.id === productId) || productsData[0];
  let qty = 1;

  document.title = product.name + ' | أجواء الصيف للتكييف';

  document.getElementById('productDetail').innerHTML = `
    <div class="product-gallery">
      <div class="main-image"><img src="${product.image}" alt="${product.name}" id="mainImg"></div>
      <div class="product-thumbs">
        <div class="thumb active" onclick="this.parentElement.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active');"><img src="${product.image}" alt=""></div>
        <div class="thumb" onclick="this.parentElement.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active');"><img src="${product.image}" alt=""></div>
        <div class="thumb" onclick="this.parentElement.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active');"><img src="${product.image}" alt=""></div>
      </div>
    </div>
    <div class="product-detail-info">
      <div class="product-brand" style="font-size:0.85rem;margin-bottom:4px;">${product.brand}</div>
      <h1>${product.name}</h1>
      <div class="product-rating" style="font-size:1rem;margin:8px 0;">
        <div class="stars" style="font-size:1rem;color:#fbbf24;">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5-Math.floor(product.rating))}</div>
        <span style="color:var(--gray-500);font-size:0.9rem;">(${product.reviews} تقييم)</span>
      </div>
      <div class="product-detail-price">
        ${product.oldPrice ? `<span class="old">${product.oldPrice.toLocaleString()} ريال</span>` : ''}
        ${product.discount ? `<span class="discount-badge">-${product.discount}%</span>` : ''}
        <div>${product.price.toLocaleString()} <span style="font-size:1rem;font-weight:500;">ريال</span></div>
      </div>

      <!-- Tamara / Tabby Banners -->
      <div class="installment-badge-container" style="margin: 15px 0;">
        <div class="installment-badge tamara-badge" style="margin-bottom:8px;">
          <img src="https://tamara.co/assets/svg/tamara-logo-ar.svg" alt="Tamara">
          <span>قسّمها على 4 دفعات بقيمة ${Math.round(product.price / 4)} ريال بدون فوائد</span>
        </div>
        <div class="installment-badge tabby-badge">
          <img src="https://tabby.ai/assets/logo.svg" alt="Tabby" style="filter: brightness(0) invert(1);">
          <span>قسّمها على 4 دفعات بقيمة ${Math.round(product.price / 4)} ريال بدون فوائد</span>
        </div>
      </div>

      <p style="color:var(--gray-600);line-height:1.8;margin:16px 0;">
        تكييف ${product.brand} ${product.hp} حصان ${product.inverter ? 'انفرتر موفر للطاقة' : ''} بتقنية التبريد السريع وفلتر بلازما لتنقية الهواء. يأتي مع ضمان شامل وتركيب مجاني.
      </p>

      <div class="product-specs">
        <div class="spec-row"><span class="spec-label">الماركة</span><span class="spec-value">${product.brand}</span></div>
        <div class="spec-row"><span class="spec-label">القدرة</span><span class="spec-value">${product.hp} حصان</span></div>
        <div class="spec-row"><span class="spec-label">النوع</span><span class="spec-value">${product.inverter ? 'انفرتر' : 'عادي'}</span></div>
        <div class="spec-row"><span class="spec-label">التبريد</span><span class="spec-value">بارد${product.name.includes('ساخن') ? ' / ساخن' : ''}</span></div>
        <div class="spec-row"><span class="spec-label">الضمان</span><span class="spec-value">5 سنوات</span></div>
        <div class="spec-row"><span class="spec-label">التوصيل</span><span class="spec-value">مجاني</span></div>
      </div>

      <div class="product-qty">
        <span style="font-weight:600;">الكمية:</span>
        <div class="qty-control">
          <button onclick="qty=Math.max(1,qty-1);document.getElementById('qtyVal').value=qty;">-</button>
          <input type="text" value="1" id="qtyVal" readonly>
          <button onclick="qty++;document.getElementById('qtyVal').value=qty;">+</button>
        </div>
      </div>

      <div class="product-actions">
        <button class="btn btn-primary btn-lg" onclick="for(let i=0;i<qty;i++)addToCart(${product.id});">
          <i class="fas fa-shopping-cart"></i> أضف للسلة
        </button>
        <button class="btn btn-outline btn-lg" onclick="toggleWishlist(${product.id})">
          <i class="far fa-heart"></i> المفضلة
        </button>
      </div>

      <div style="margin-top:20px;display:flex;gap:16px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--gray-500);"><i class="fas fa-truck" style="color:var(--success);"></i> توصيل مجاني</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--gray-500);"><i class="fas fa-shield-alt" style="color:var(--primary);"></i> ضمان 5 سنوات</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--gray-500);"><i class="fas fa-undo" style="color:var(--warning);"></i> استرجاع مجاني</div>
      </div>
    </div>
  `;

  // Related products
  const related = productsData.filter(p => p.id !== product.id && p.brand === product.brand).slice(0,4);
  const fallback = related.length ? related : productsData.filter(p => p.id !== product.id).slice(0,4);
  renderProducts('related-products', fallback);
</script>
</body>
</html>
