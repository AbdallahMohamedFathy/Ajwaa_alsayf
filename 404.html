<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة غير موجودة | أجواء الصيف للتكييف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="assets/images/logo.png">
  <style>
    .error-page {
      min-height: 100vh;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      top: 10%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-page::after {
      content: '';
      position: absolute;
      bottom: 5%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,75,173,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.6s ease;
    }
    .error-number {
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      position: relative;
    }
    .error-number::after {
      content: '؟';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      background: none;
      -webkit-text-fill-color: rgba(0,123,255,0.15);
      pointer-events: none;
    }
    .error-icon {
      width: 90px;
      height: 90px;
      background: rgba(0,123,255,0.08);
      border: 2px solid rgba(0,123,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.2rem;
      color: var(--primary);
      animation: float 4s ease-in-out infinite;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 1rem;
      color: var(--gray-500);
      max-width: 450px;
      margin: 0 auto 36px;
      line-height: 1.8;
    }
    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-links {
      margin-top: 40px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-500);
      font-size: 0.9rem;
      font-weight: 600;
      transition: color var(--transition-fast);
    }
    .error-link:hover { color: var(--primary); }
    .error-link i {
      width: 34px;
      height: 34px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      font-size: 0.85rem;
      transition: all var(--transition-fast);
    }
    .error-link:hover i {
      background: var(--primary);
      color: var(--white);
      box-shadow: var(--shadow-glow);
    }
    .snowflakes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .snowflake {
      position: absolute;
      color: rgba(0,212,255,0.3);
      font-size: 1.5rem;
      animation: snow-fall linear infinite;
    }
    @keyframes snow-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="container">
    <a href="index.html" class="navbar-logo"><img src="assets/images/logo.png" alt="أجواء الصيف"></a>
    <div class="navbar-menu" id="navMenu">
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="services.html">الخدمات</a>
      <a href="booking.html">احجز صيانة</a>
    </div>
    <div class="navbar-actions">
      <div id="navbarAuth"></div>
      <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="error-page">
  <div class="snowflakes" id="snowflakes"></div>

  <div class="error-content">
    <div class="error-icon">
      <i class="fas fa-snowflake fa-spin" style="animation-duration:4s;"></i>
    </div>
    <div class="error-number">404</div>
    <h1 class="error-title">عذراً! الصفحة غير موجودة</h1>
    <p class="error-desc">
      يبدو أن الصفحة التي تبحث عنها قد اختفت مثل البرودة في الصيف!<br>
      ربما تم نقل الصفحة أو حذفها أو الرابط غير صحيح.
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary btn-lg">
        <i class="fas fa-home"></i> العودة للرئيسية
      </a>
      <a href="products.html" class="btn btn-outline btn-lg">
        <i class="fas fa-shopping-bag"></i> تصفح المنتجات
      </a>
    </div>
    <div class="error-links">
      <a href="services.html" class="error-link">
        <i class="fas fa-tools"></i> الخدمات
      </a>
      <a href="booking.html" class="error-link">
        <i class="fas fa-calendar-check"></i> حجز صيانة
      </a>
      <a href="index.html#contact" class="error-link">
        <i class="fas fa-phone"></i> تواصل معنا
      </a>
      <a href="profile.html" class="error-link" id="profileLink" style="display:none;">
        <i class="fas fa-user"></i> حسابي
      </a>
    </div>
  </div>
</div>

<a href="https://wa.me/966530656834" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/main.js"></script>
<script>
  // Add snowflakes
  const container = document.getElementById('snowflakes');
  for (let i = 0; i < 12; i++) {
    const flake = document.createElement('div');
    flake.className = 'snowflake';
    flake.innerHTML = '<i class="fas fa-snowflake"></i>';
    flake.style.cssText = `
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 8 + 6}s;
      animation-delay: ${Math.random() * 5}s;
      font-size: ${Math.random() * 1 + 0.8}rem;
      opacity: ${Math.random() * 0.4 + 0.1};
    `;
    container.appendChild(flake);
  }

  // Show profile link if logged in
  if (isLoggedIn()) {
    document.getElementById('profileLink').style.display = 'flex';
  }

  // Auto redirect countdown
  let seconds = 30;
  const titleEl = document.querySelector('.error-desc');
  const originalText = titleEl.innerHTML;

  const timer = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = 'index.html';
    }
  }, 1000);
</script>
</body>
</html>
